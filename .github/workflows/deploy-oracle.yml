name: Deploy Oracle

on:
  workflow_dispatch:

concurrency:
  group: oracle-production
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      APP_DIR: /opt/stock_scheduler
      DEPLOY_COMPOSE_FILE: ${{ vars.DEPLOY_COMPOSE_FILE || 'docker-compose.oracle-lite.yml' }}
      KIS_ENV: ${{ vars.KIS_ENV || 'virtual' }}
      POSTGRES_PASSWORD: ${{ secrets.POSTGRES_PASSWORD || 'stock_scheduler' }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install backend dependencies
        run: pip install -r requirements.txt

      - name: Run backend tests
        run: pytest -q

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Build frontend
        working-directory: frontend
        run: npm ci && npm run build

      - name: Check deploy secrets
        env:
          OCI_HOST: ${{ vars.OCI_HOST }}
          OCI_USER: ${{ vars.OCI_USER }}
          OCI_SSH_PRIVATE_KEY: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || vars.TELEGRAM_CHAT_ID }}
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: |
          test -n "$OCI_HOST"
          test -n "$OCI_USER"
          test -n "$OCI_SSH_PRIVATE_KEY"
          test -n "$TELEGRAM_CHAT_ID"
          test -n "$CODEX_AUTH_JSON"

      - name: Create production env
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID || vars.TELEGRAM_CHAT_ID }}
          KIS_REAL_APP_KEY: ${{ secrets.KIS_REAL_APP_KEY }}
          KIS_REAL_APP_SECRET: ${{ secrets.KIS_REAL_APP_SECRET }}
          KIS_VIRTUAL_APP_KEY: ${{ secrets.KIS_VIRTUAL_APP_KEY }}
          KIS_VIRTUAL_APP_SECRET: ${{ secrets.KIS_VIRTUAL_APP_SECRET }}
          KIS_REAL_BASE_URL: ${{ vars.KIS_REAL_BASE_URL || 'https://openapi.koreainvestment.com:9443' }}
          KIS_VIRTUAL_BASE_URL: ${{ vars.KIS_VIRTUAL_BASE_URL || 'https://openapivts.koreainvestment.com:29443' }}
        run: |
          cat > /tmp/stock_scheduler.env <<EOF
          POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
          CODEX_BIN=/usr/local/bin/codex
          CORS_ALLOW_ORIGINS=http://${{ vars.OCI_HOST }}:5173
          NOTIFICATION_MODE=telegram
          TELEGRAM_BOT_TOKEN=${TELEGRAM_BOT_TOKEN}
          TELEGRAM_CHAT_ID=${TELEGRAM_CHAT_ID}
          KIS_ENV=${KIS_ENV}
          KIS_GRANT_TYPE=client_credentials
          KIS_VIRTUAL_APP_KEY=${KIS_VIRTUAL_APP_KEY}
          KIS_VIRTUAL_APP_SECRET=${KIS_VIRTUAL_APP_SECRET}
          KIS_VIRTUAL_BASE_URL=${KIS_VIRTUAL_BASE_URL}
          KIS_REAL_APP_KEY=${KIS_REAL_APP_KEY}
          KIS_REAL_APP_SECRET=${KIS_REAL_APP_SECRET}
          KIS_REAL_BASE_URL=${KIS_REAL_BASE_URL}
          EOF

      - name: Create Codex auth file
        env:
          CODEX_AUTH_JSON: ${{ secrets.CODEX_AUTH_JSON }}
        run: |
          printf '%s' "$CODEX_AUTH_JSON" > /tmp/codex-auth.json
          test -s /tmp/codex-auth.json

      - name: Create release archive
        run: |
          tar \
            --exclude='.git' \
            --exclude='.github' \
            --exclude='.venv' \
            --exclude='frontend/node_modules' \
            --exclude='frontend/dist' \
            --exclude='stock_scheduler.db' \
            --exclude='.env' \
            --exclude='secrets/codex/auth.json' \
            -czf /tmp/stock_scheduler-release.tar.gz .

      - name: Configure SSH
        env:
          OCI_SSH_PRIVATE_KEY: ${{ secrets.OCI_SSH_PRIVATE_KEY }}
          OCI_HOST: ${{ vars.OCI_HOST }}
        run: |
          mkdir -p ~/.ssh
          printf '%s\n' "$OCI_SSH_PRIVATE_KEY" > ~/.ssh/oci_key
          chmod 600 ~/.ssh/oci_key
          ssh-keyscan -H "$OCI_HOST" >> ~/.ssh/known_hosts

      - name: Upload release
        env:
          OCI_HOST: ${{ vars.OCI_HOST }}
          OCI_USER: ${{ vars.OCI_USER }}
        run: |
          scp -i ~/.ssh/oci_key /tmp/stock_scheduler-release.tar.gz "$OCI_USER@$OCI_HOST:/tmp/stock_scheduler-release.tar.gz"
          scp -i ~/.ssh/oci_key /tmp/stock_scheduler.env "$OCI_USER@$OCI_HOST:/tmp/stock_scheduler.env"
          scp -i ~/.ssh/oci_key /tmp/codex-auth.json "$OCI_USER@$OCI_HOST:/tmp/codex-auth.json"

      - name: Deploy on Oracle VM
        env:
          OCI_HOST: ${{ vars.OCI_HOST }}
          OCI_USER: ${{ vars.OCI_USER }}
        run: |
          ssh -i ~/.ssh/oci_key "$OCI_USER@$OCI_HOST" \
            "APP_DIR='$APP_DIR' DEPLOY_COMPOSE_FILE='$DEPLOY_COMPOSE_FILE' RELEASE_ARCHIVE=/tmp/stock_scheduler-release.tar.gz ENV_FILE=/tmp/stock_scheduler.env CODEX_AUTH_FILE=/tmp/codex-auth.json bash -s" \
            < scripts/oracle-deploy.sh
