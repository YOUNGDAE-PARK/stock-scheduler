services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:////data/stock_scheduler.db
      CODEX_HOME: /root/.codex
      CODEX_BIN: /usr/local/bin/codex
    volumes:
      - sqlite_data:/data
      - ./secrets/codex/auth.json:/root/.codex/auth.json:ro
    restart: unless-stopped
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      - backend
    restart: unless-stopped
    ports:
      - "5173:5173"

volumes:
  sqlite_data:
