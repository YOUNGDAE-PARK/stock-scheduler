services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    environment:
      DATABASE_URL: sqlite:////app/stock_scheduler.db
      CODEX_HOME: /root/.codex
      GEMINI_HOME: /root/.gemini
    volumes:
      - ./stock_scheduler.db:/app/stock_scheduler.db
      - ./secrets/codex/auth.json:/root/.codex/auth.json:ro
      - ./secrets/gemini:/root/.gemini
    network_mode: host
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      - backend
    restart: unless-stopped
    ports:
      - "5173:5173"

volumes:
  sqlite_data:
