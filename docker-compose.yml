services:
  db:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: stock_scheduler
      POSTGRES_USER: stock_scheduler
      POSTGRES_PASSWORD: stock_scheduler
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stock_scheduler -d stock_scheduler"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    environment:
      DATABASE_URL: postgresql://stock_scheduler:stock_scheduler@db:5432/stock_scheduler
      CODEX_HOME: /root/.codex
      CODEX_BIN: /usr/local/bin/codex
    volumes:
      - ./secrets/codex/auth.json:/root/.codex/auth.json:ro
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres_data:
