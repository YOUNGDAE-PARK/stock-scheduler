services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: stock_scheduler
      POSTGRES_USER: stock_scheduler
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-stock_scheduler}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U stock_scheduler -d stock_scheduler"]
      interval: 5s
      timeout: 5s
      retries: 20

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    env_file:
      - .env
    environment:
      CODEX_HOME: /root/.codex
      GEMINI_HOME: /root/.gemini
    network_mode: host
    restart: unless-stopped
    volumes:
      - ./secrets/codex/auth.json:/root/.codex/auth.json:ro
      - /home/eins777/.gemini:/root/.gemini
      - ./stock_scheduler.db:/app/stock_scheduler.db
    depends_on:
      db:
        condition: service_healthy
    ports:
      - "8000:8000"

  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    restart: unless-stopped
    depends_on:
      - backend
    ports:
      - "5173:5173"

volumes:
  postgres_data:
